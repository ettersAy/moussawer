services:
  - type: web
    name: moussawer
    env: node
    buildCommand: npm install && npm run build && npx prisma db push && npx prisma generate
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: moussawer-db
          property: connectionString
      - key: JWT_SECRET
        value: d6fb73ec361ec5bd4bc60f8375e5f310
