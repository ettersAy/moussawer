services:
  - type: web
    name: moussawer
    env: node
    buildCommand: npm install && npm run build && npx prisma db push && npx prisma generate
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        # ⚠️ Set this manually in Render dashboard to your Supabase PostgreSQL connection string
        # See doc/FREE_HOSTING_GUIDE.md for instructions
        sync: false
      - key: JWT_SECRET
        value: d6fb73ec361ec5bd4bc60f8375e5f310
